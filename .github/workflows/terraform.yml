name: Terraform Plan

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          for dir in $(find . -name "*.tf" -exec dirname {} \; | sort -u); do
            cd "$dir"
            terraform init -backend=false
            cd - >/dev/null
          done

      - name: Terraform Plan
        run: |
          mkdir plans
          for dir in $(find . -name "*.tf" -exec dirname {} \; | sort -u); do
            cd "$dir"
            terraform plan -out=tfplan || true
            mv tfplan ../plans/$(basename "$dir").tfplan 2>/dev/null || true
            cd - >/dev/null
          done

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plans
          path: plans/